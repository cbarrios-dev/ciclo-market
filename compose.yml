services:
  db:
    image: postgres:15.3-alpine
    container_name: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234567
      POSTGRES_DB: CicloMarketDb
    volumes:
      - pgdata:/var/lib/postgresql/data

  # api:
  #   depends_on:
  #     - db

  # web:
  #   depends_on:
  #     - api

volumes:
  pgdata:
